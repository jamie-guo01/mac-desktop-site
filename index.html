<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Mac Desktop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --sonoma-1: #1a1b4b;
      --sonoma-2: #2d1f6b;
      --sonoma-3: #4a2d8a;
      --sonoma-4: #1e3a5f;
      --sonoma-5: #0f2b4a;
      --sonoma-6: #3b1f5e;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    /* ==================== PHASE 1: BOOT ==================== */
    #boot-screen {
      position: fixed; inset: 0; z-index: 9999;
      background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.8s ease;
    }
    #boot-screen.fade-out { opacity: 0; pointer-events: none; }

    .apple-logo-boot {
      width: 56px; height: 56px;
      margin-bottom: 48px;
    }
    .apple-logo-boot svg { fill: #fff; width: 100%; height: 100%; }

    .progress-track {
      width: 180px; height: 5px;
      background: rgba(255,255,255,0.15);
      border-radius: 3px; overflow: hidden;
    }
    .progress-fill {
      width: 0%; height: 100%;
      background: #fff;
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    /* ==================== PHASE 2: LOCK SCREEN ==================== */
    #lock-screen {
      position: fixed; inset: 0; z-index: 9998;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    #lock-screen.visible {
      display: flex;
    }
    #lock-screen.fade-out {
      opacity: 0;
      transform: scale(1.05);
      pointer-events: none;
    }

    .sonoma-wallpaper {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 120% 80% at 20% 80%, #1a3a6b 0%, transparent 60%),
        radial-gradient(ellipse 100% 70% at 80% 70%, #4a2080 0%, transparent 55%),
        radial-gradient(ellipse 140% 60% at 50% 100%, #1e2d5a 0%, transparent 50%),
        radial-gradient(ellipse 80% 90% at 70% 30%, #2a1558 0%, transparent 50%),
        radial-gradient(ellipse 100% 100% at 30% 20%, #0f1f3d 0%, transparent 60%),
        linear-gradient(180deg, #0a0e1a 0%, #151030 40%, #1a1845 70%, #0d1528 100%);
    }

    .lock-time {
      position: relative; z-index: 2;
      font-size: 96px; font-weight: 700;
      color: #fff;
      letter-spacing: -2px;
      text-shadow: 0 2px 40px rgba(0,0,0,0.3);
      line-height: 1;
    }
    .lock-date {
      position: relative; z-index: 2;
      font-size: 22px; font-weight: 400;
      color: rgba(255,255,255,0.8);
      margin-top: 8px;
      letter-spacing: 0.5px;
    }
    .lock-hint {
      position: relative; z-index: 2;
      margin-top: 60px;
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      animation: pulse-hint 2s ease-in-out infinite;
    }
    @keyframes pulse-hint {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* ==================== PHASE 3: DESKTOP ==================== */
    #desktop {
      position: fixed; inset: 0; z-index: 100;
      display: none;
      flex-direction: column;
    }
    #desktop.visible {
      display: flex;
    }

    /* Wallpaper */
    .desktop-wallpaper {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 120% 80% at 20% 80%, #1a3a6b 0%, transparent 60%),
        radial-gradient(ellipse 100% 70% at 80% 70%, #4a2080 0%, transparent 55%),
        radial-gradient(ellipse 140% 60% at 50% 100%, #1e2d5a 0%, transparent 50%),
        radial-gradient(ellipse 80% 90% at 70% 30%, #2a1558 0%, transparent 50%),
        radial-gradient(ellipse 100% 100% at 30% 20%, #0f1f3d 0%, transparent 60%),
        linear-gradient(180deg, #0a0e1a 0%, #151030 40%, #1a1845 70%, #0d1528 100%);
    }

    /* Menu Bar */
    .menu-bar {
      position: relative; z-index: 10;
      height: 28px;
      background: rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(30px) saturate(180%);
      -webkit-backdrop-filter: blur(30px) saturate(180%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      color: rgba(255,255,255,0.9);
      font-size: 13px;
      font-weight: 500;
      flex-shrink: 0;
    }
    .menu-left {
      display: flex; align-items: center; gap: 16px;
    }
    .menu-apple-logo { width: 13px; height: 16px; opacity: 0.9; }
    .menu-apple-logo svg { fill: #fff; width: 100%; height: 100%; }
    .menu-right {
      display: flex; align-items: center; gap: 14px;
      font-size: 12px; font-weight: 400;
      color: rgba(255,255,255,0.85);
    }
    .menu-right span { white-space: nowrap; }

    /* Desktop icon area */
    .desktop-icons {
      position: relative; z-index: 5;
      flex: 1;
      padding: 24px 32px;
      display: grid;
      grid-template-columns: repeat(auto-fill, 90px);
      grid-template-rows: repeat(auto-fill, 100px);
      grid-auto-flow: column;
      gap: 8px;
      align-content: start;
      justify-content: end;
    }

    .desktop-icon {
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      width: 90px; height: 100px;
      padding: 6px 4px;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s ease;
    }
    .desktop-icon:hover {
      background: rgba(255,255,255,0.1);
    }
    .desktop-icon:active {
      background: rgba(255,255,255,0.18);
    }

    .icon-img {
      width: 56px; height: 56px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 5px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 0.5px 0 rgba(255,255,255,0.15);
    }
    .icon-label {
      font-size: 11px;
      color: #fff;
      text-align: center;
      line-height: 1.2;
      text-shadow: 0 1px 3px rgba(0,0,0,0.6);
      max-width: 80px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Dock */
    .dock-wrapper {
      position: relative; z-index: 10;
      display: flex;
      justify-content: center;
      padding-bottom: 6px;
      flex-shrink: 0;
    }
    .dock {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(30px) saturate(180%);
      -webkit-backdrop-filter: blur(30px) saturate(180%);
      border-radius: 18px;
      border: 0.5px solid rgba(255,255,255,0.2);
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }
    .dock-separator {
      width: 1px; height: 36px;
      background: rgba(255,255,255,0.2);
      margin: 0 4px;
    }

    .dock-item {
      width: 48px; height: 48px;
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: transform 0.2s ease;
      position: relative;
      text-decoration: none;
    }
    .dock-item:hover {
      transform: scale(1.25) translateY(-8px);
    }
    .dock-item .dock-icon {
      width: 44px; height: 44px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.25), inset 0 0.5px 0 rgba(255,255,255,0.15);
    }

    .dock-item .tooltip {
      position: absolute;
      bottom: 58px; left: 50%;
      transform: translateX(-50%) scale(0.8);
      background: rgba(0,0,0,0.7);
      color: #fff;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 4px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s, transform 0.15s;
    }
    .dock-item:hover .tooltip {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    /* APP ICON STYLES */
    .app-vibe {
      background: linear-gradient(135deg, #5B5EF4 0%, #8B5CF6 50%, #A855F7 100%);
    }
    .app-vibe svg { width: 28px; height: 28px; stroke: #fff; fill: none; stroke-width: 1.5; }

    .app-safari {
      background: linear-gradient(180deg, #5CC8FA 0%, #1E90FF 50%, #0055D4 100%);
    }
    .app-safari svg { width: 26px; height: 26px; fill: #fff; }

    .app-finder {
      background: linear-gradient(180deg, #6CB4EE 0%, #2196F3 100%);
    }
    .app-finder svg { width: 24px; height: 24px; fill: #fff; }

    .app-settings {
      background: linear-gradient(180deg, #8E8E93 0%, #636366 100%);
    }
    .app-settings svg { width: 24px; height: 24px; stroke: #fff; fill: none; stroke-width: 1.5; }

    .app-notes {
      background: linear-gradient(180deg, #FECA57 0%, #FF9F43 100%);
    }
    .app-notes svg { width: 24px; height: 24px; fill: #fff; }

    .app-terminal {
      background: linear-gradient(180deg, #1a1a1a 0%, #000000 100%);
    }
    .app-terminal svg { width: 24px; height: 24px; stroke: #0f0; fill: none; stroke-width: 1.5; }

    .app-launchpad {
      background: linear-gradient(180deg, #434343 0%, #1a1a1a 100%);
    }

    .app-trash {
      background: transparent;
    }
    .app-trash svg { width: 32px; height: 32px; stroke: rgba(255,255,255,0.8); fill: none; stroke-width: 1; }

    /* Fade in animation for desktop */
    #desktop.visible {
      animation: fadeInDesktop 0.6s ease forwards;
    }
    @keyframes fadeInDesktop {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Open-app animation */
    .desktop-icon.opening .icon-img {
      animation: bounceIcon 0.4s ease;
    }
    @keyframes bounceIcon {
      0% { transform: scale(1); }
      30% { transform: scale(0.85); }
      60% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

<!-- ==================== PHASE 1: BOOT SCREEN ==================== -->
<div id="boot-screen">
  <div class="apple-logo-boot">
    <svg viewBox="0 0 814 1000" xmlns="http://www.w3.org/2000/svg">
      <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76.5 0-103.7 40.8-165.9 40.8s-105.6-57.8-155.5-127.4c-58.5-81.8-105.9-209.6-105.9-330.8 0-194.4 126.4-297.5 250.8-297.5 66.1 0 121.2 43.4 162.7 43.4 39.5 0 101.1-46 176.3-46 28.5 0 130.9 2.6 198.3 99.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z"/>
    </svg>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="boot-progress"></div>
  </div>
</div>

<!-- ==================== PHASE 2: LOCK SCREEN ==================== -->
<div id="lock-screen">
  <div class="sonoma-wallpaper"></div>
  <div class="lock-time" id="lock-time">00:00</div>
  <div class="lock-date" id="lock-date"></div>
  <div class="lock-hint">点击任意位置解锁</div>
</div>

<!-- ==================== PHASE 3: DESKTOP ==================== -->
<div id="desktop">
  <div class="desktop-wallpaper"></div>

  <!-- Menu Bar -->
  <div class="menu-bar">
    <div class="menu-left">
      <div class="menu-apple-logo">
        <svg viewBox="0 0 814 1000" xmlns="http://www.w3.org/2000/svg">
          <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76.5 0-103.7 40.8-165.9 40.8s-105.6-57.8-155.5-127.4c-58.5-81.8-105.9-209.6-105.9-330.8 0-194.4 126.4-297.5 250.8-297.5 66.1 0 121.2 43.4 162.7 43.4 39.5 0 101.1-46 176.3-46 28.5 0 130.9 2.6 198.3 99.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z"/>
        </svg>
      </div>
      <span style="font-weight:600;">Finder</span>
      <span>文件</span>
      <span>编辑</span>
      <span>显示</span>
      <span>前往</span>
      <span>窗口</span>
      <span>帮助</span>
    </div>
    <div class="menu-right">
      <span id="menu-battery">
        <svg width="20" height="10" viewBox="0 0 20 10" fill="none" style="vertical-align: middle;">
          <rect x="0.5" y="0.5" width="17" height="9" rx="2" stroke="rgba(255,255,255,0.8)" stroke-width="1"/>
          <rect x="18.5" y="3" width="1.5" height="4" rx="0.5" fill="rgba(255,255,255,0.5)"/>
          <rect x="2" y="2" width="13" height="6" rx="1" fill="rgba(255,255,255,0.8)"/>
        </svg>
      </span>
      <span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="2" style="vertical-align: middle;">
          <path d="M12 2a7 7 0 0 1 7 7c0 2.38-1.19 4.47-3 5.74V17a2 2 0 0 1-2 2H10a2 2 0 0 1-2-2v-2.26C6.19 13.47 5 11.38 5 9a7 7 0 0 1 7-7z"/>
        </svg>
      </span>
      <span id="menu-clock">00:00</span>
    </div>
  </div>

  <!-- Desktop Icons Area -->
  <div class="desktop-icons" id="desktop-icons">
    <!-- Vibe Coding Guide -->
    <a class="desktop-icon" href="vibe-coding-guide.html" onclick="openApp(event, this)">
      <div class="icon-img app-vibe">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="icon-label">Vibe Coding</span>
    </a>
  </div>

  <!-- Dock -->
  <div class="dock-wrapper">
    <div class="dock">
      <!-- Finder -->
      <a class="dock-item" href="#" onclick="return false;">
        <div class="dock-icon app-finder">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="3" width="20" height="18" rx="3"/>
            <circle cx="8.5" cy="10" r="1.5" fill="#2196F3"/>
            <circle cx="15.5" cy="10" r="1.5" fill="#2196F3"/>
            <path d="M8 15c1 1.5 7 1.5 8 0" fill="none" stroke="#2196F3" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="tooltip">Finder</span>
      </a>

      <!-- Safari -->
      <a class="dock-item" href="#" onclick="return false;">
        <div class="dock-icon app-safari">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="10" fill="none" stroke="#fff" stroke-width="1.5"/>
            <polygon points="16.5,7.5 10,10 7.5,16.5 14,14" fill="#fff" opacity="0.9"/>
            <polygon points="10,10 7.5,16.5 14,14" fill="#FF3B30" opacity="0.8"/>
          </svg>
        </div>
        <span class="tooltip">Safari</span>
      </a>

      <div class="dock-separator"></div>

      <!-- Vibe Coding (also in dock) -->
      <a class="dock-item" href="vibe-coding-guide.html" onclick="openApp(event, this)">
        <div class="dock-icon app-vibe">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" stroke="#fff" fill="none" stroke-width="1.5">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="tooltip">Vibe Coding</span>
      </a>

      <div class="dock-separator"></div>

      <!-- Trash -->
      <a class="dock-item" href="#" onclick="return false;">
        <div class="dock-icon app-trash">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="tooltip">废纸篓</span>
      </a>
    </div>
  </div>
</div>

<script>
  // ==================== CLOCK ==================== 
  const weekdays = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];

  function updateClocks() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    const timeStr = h + ':' + m;

    const lockTimeEl = document.getElementById('lock-time');
    const lockDateEl = document.getElementById('lock-date');
    const menuClockEl = document.getElementById('menu-clock');

    if (lockTimeEl) lockTimeEl.textContent = timeStr;
    if (lockDateEl) {
      const month = now.getMonth() + 1;
      const day = now.getDate();
      const wd = weekdays[now.getDay()];
      lockDateEl.textContent = month + '月' + day + '日 ' + wd;
    }
    if (menuClockEl) {
      const month = now.getMonth() + 1;
      const day = now.getDate();
      const wd = weekdays[now.getDay()];
      menuClockEl.textContent = wd + ' ' + month + '月' + day + '日 ' + timeStr;
    }
  }
  updateClocks();
  setInterval(updateClocks, 1000);

  // ==================== BOOT SEQUENCE ==================== 
  const bootScreen = document.getElementById('boot-screen');
  const lockScreen = document.getElementById('lock-screen');
  const desktop = document.getElementById('desktop');
  const progressFill = document.getElementById('boot-progress');

  let progress = 0;
  const bootInterval = setInterval(() => {
    progress += Math.random() * 12 + 3;
    if (progress >= 100) {
      progress = 100;
      progressFill.style.width = '100%';
      clearInterval(bootInterval);
      setTimeout(() => {
        bootScreen.classList.add('fade-out');
        setTimeout(() => {
          bootScreen.style.display = 'none';
          lockScreen.classList.add('visible');
        }, 800);
      }, 400);
    } else {
      progressFill.style.width = progress + '%';
    }
  }, 200);

  // ==================== LOCK -> DESKTOP ==================== 
  lockScreen.addEventListener('click', () => {
    lockScreen.classList.add('fade-out');
    setTimeout(() => {
      lockScreen.style.display = 'none';
      desktop.classList.add('visible');
    }, 600);
  });

  // ==================== OPEN APP ==================== 
  function openApp(e, el) {
    e.preventDefault();
    const iconEl = el.closest('.desktop-icon') || el;
    iconEl.classList.add('opening');
    const href = el.getAttribute('href');

    setTimeout(() => {
      if (href && href !== '#') {
        window.location.href = href;
      }
    }, 400);

    setTimeout(() => {
      iconEl.classList.remove('opening');
    }, 500);
  }
</script>

</body>
</html>
